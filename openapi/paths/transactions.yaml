paths:
  /transactions:
    post:
      summary: Create a transaction
      description: Creates a deposit (CREDIT) or withdrawal (DEBIT). Updates account balance atomically. Returns 409 if DEBIT exceeds balance.
      tags:
        - transactions
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreateRequest'
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Validation error
        '401':
          description: Authentication failed
        '404':
          description: Account not found
        '409':
          description: Insufficient funds or account not active
  /transactions/{id}:
    get:
      summary: Get transaction by ID
      description: Retrieve a single transaction by its UUID.
      tags:
        - transactions
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the transaction
          example: "44cfd375-4821-4eb0-9672-18d289eb47e7"
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Invalid transaction ID
        '401':
          description: Authentication failed
        '404':
          description: Transaction not found