paths:
  /auth/register:
    post:
      tags:
        - auth
      summary: Register a new user
      description: Registers a new user given valid username and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered new user successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error (invalid input)
        '409':
          description: Username already exists
  /auth/login:
    post:
      tags:
        - auth
      summary: Login a user
      description: Authenticates a user with username and password. Creates a Redis session and returns a session ID. Use the session ID in the x-session-id header for authenticated requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful, session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error (invalid input)
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      tags:
        - auth
      summary: Logout the current user
      description: Invalidates the current session by deleting it from Redis. After logout, the session ID can no longer be used to access protected endpoints.
      security:
        - sessionAuth: []
      responses:
        '204':
          description: Logout successful, session invalidated
        '401':
          description: Authentication failed
  /auth/me:
    get:
      tags:
        - auth
      summary: Get current user profile
      description: Returns the authenticated user's profile including their linked customer information. Requires a valid session.
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Authentication failed
        '404':
          description: User not found 